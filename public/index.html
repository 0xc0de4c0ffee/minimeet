<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>OneMinute — 60-Second Video Calls</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.socket.io/4.7.4/socket.io.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0A0A0F;
      --surface: rgba(255,255,255,0.04);
      --surface-hover: rgba(255,255,255,0.07);
      --border: rgba(255,255,255,0.08);
      --text: #EEEEF0;
      --text-muted: #666;
      --red: #E8453C;
      --green: #4ADE80;
      --amber: #E8A83C;
      --font-body: 'DM Sans', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    body {
      font-family: var(--font-body);
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow: hidden;
    }

    /* ── Screens ──────────────────────────────────────────── */
    .screen { display: none; height: 100vh; }
    .screen.active { display: flex; }

    /* ── Login Screen ─────────────────────────────────────── */
    #login-screen {
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 24px;
      animation: fadeIn 0.5s ease;
    }
    .login-logo {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 8px;
    }
    .login-logo-icon {
      width: 56px; height: 56px;
      border-radius: 16px;
      background: rgba(232,69,60,0.12);
      border: 1px solid rgba(232,69,60,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    .login-title {
      font-family: var(--font-mono);
      font-size: 32px; font-weight: 700;
    }
    .login-subtitle {
      font-size: 13px; color: var(--text-muted);
      letter-spacing: 2px; text-transform: uppercase;
    }
    .login-input {
      width: 320px; padding: 14px 18px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      color: var(--text);
      font-size: 16px; font-family: var(--font-body);
      outline: none;
      transition: border-color 0.2s;
    }
    .login-input:focus { border-color: rgba(232,69,60,0.5); }
    .login-input::placeholder { color: #444; }
    .login-btn {
      width: 320px; padding: 14px;
      background: var(--red);
      border: none; border-radius: 14px;
      color: #fff; font-size: 16px; font-weight: 600;
      font-family: var(--font-body);
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s;
    }
    .login-btn:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(232,69,60,0.4);
    }

    /* ── Contacts Screen ──────────────────────────────────── */
    #contacts-screen {
      flex-direction: column;
      max-width: 500px;
      margin: 0 auto;
      padding: 32px 20px;
      width: 100%;
      animation: fadeIn 0.4s ease;
    }
    .header {
      display: flex; justify-content: space-between;
      align-items: flex-start; margin-bottom: 24px;
    }
    .header-left { display: flex; align-items: center; gap: 12px; }
    .logo-icon {
      width: 42px; height: 42px; border-radius: 12px;
      background: rgba(232,69,60,0.12);
      border: 1px solid rgba(232,69,60,0.25);
      display: flex; align-items: center; justify-content: center;
    }
    .logo-title {
      font-family: var(--font-mono);
      font-size: 22px; font-weight: 700;
    }
    .logo-sub {
      font-size: 12px; color: var(--text-muted);
      letter-spacing: 1.5px; text-transform: uppercase; margin-top: 2px;
    }
    .timer-badge {
      font-family: var(--font-mono);
      font-size: 12px; font-weight: 700; color: var(--red);
      background: rgba(232,69,60,0.1);
      border: 1px solid rgba(232,69,60,0.2);
      border-radius: 20px; padding: 6px 12px;
    }
    .my-name {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 16px;
      font-family: var(--font-mono);
    }
    .my-name span { color: var(--green); font-weight: 700; }
    .search-wrap {
      position: relative; margin-bottom: 16px;
    }
    .search-wrap svg {
      position: absolute; left: 14px; top: 50%;
      transform: translateY(-50%); pointer-events: none;
    }
    .search-input {
      width: 100%; padding: 12px 14px 12px 40px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px; color: var(--text);
      font-size: 14px; font-family: var(--font-body);
      outline: none;
    }
    .search-input::placeholder { color: #444; }
    .contacts-list {
      display: flex; flex-direction: column; gap: 2px;
      overflow-y: auto; flex: 1;
    }
    .contact-card {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 14px; border-radius: 14px;
      cursor: pointer; transition: all 0.2s;
      animation: slideUp 0.4s ease both;
    }
    .contact-card:hover { background: var(--surface-hover); transform: translateX(4px); }
    .contact-card.offline { opacity: 0.4; pointer-events: none; }
    .avatar {
      width: 44px; height: 44px; border-radius: 14px;
      display: flex; align-items: center; justify-content: center;
      position: relative; flex-shrink: 0;
    }
    .avatar-text {
      font-family: var(--font-mono);
      font-size: 13px; font-weight: 700; color: #fff;
    }
    .status-dot {
      position: absolute; bottom: -1px; right: -1px;
      width: 11px; height: 11px; border-radius: 50%;
      border: 2.5px solid var(--bg);
    }
    .contact-info { flex: 1; display: flex; flex-direction: column; gap: 2px; }
    .contact-name { font-size: 15px; font-weight: 500; }
    .contact-status { font-size: 12px; color: var(--text-muted); }
    .call-btn {
      width: 36px; height: 36px; border-radius: 10px;
      background: rgba(74,222,128,0.1);
      border: 1px solid rgba(74,222,128,0.15);
      display: flex; align-items: center; justify-content: center;
      color: var(--green); flex-shrink: 0;
    }

    /* ── Incoming Call Modal ───────────────────────────────── */
    .incoming-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,0.7);
      backdrop-filter: blur(8px);
      align-items: center; justify-content: center;
      z-index: 100;
      animation: fadeIn 0.3s ease;
    }
    .incoming-overlay.active { display: flex; }
    .incoming-card {
      background: #16161F;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 24px;
      padding: 36px 48px;
      display: flex; flex-direction: column;
      align-items: center; gap: 16px;
      animation: slideUp 0.4s ease;
    }
    .incoming-avatar {
      width: 80px; height: 80px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .incoming-avatar .ring {
      position: absolute; inset: 0; border-radius: 22px;
      border: 2px solid rgba(255,255,255,0.3);
      animation: ringPulse 1.5s ease-out infinite;
    }
    .incoming-avatar .ring:nth-child(2) { animation-delay: 0.5s; }
    .incoming-name { font-size: 20px; font-weight: 700; }
    .incoming-label { font-size: 13px; color: var(--text-muted); animation: pulse 2s ease infinite; }
    .incoming-actions { display: flex; gap: 20px; margin-top: 8px; }
    .accept-btn, .decline-btn {
      width: 56px; height: 56px; border-radius: 18px;
      border: none; display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: transform 0.15s;
    }
    .accept-btn { background: var(--green); }
    .decline-btn { background: var(--red); }
    .accept-btn:hover, .decline-btn:hover { transform: scale(1.08); }

    /* ── Call Screen ───────────────────────────────────────── */
    #call-screen {
      position: relative;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      background: radial-gradient(ellipse at center, #15151F 0%, #0A0A0F 70%);
      animation: fadeIn 0.3s ease;
    }
    .remote-video-area {
      width: 100%; height: 100%;
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 12px;
    }
    #remote-video {
      width: 100%; height: 100%;
      object-fit: cover;
      display: none;
    }
    .remote-placeholder {
      display: flex; flex-direction: column;
      align-items: center; gap: 12px;
    }
    .remote-avatar {
      width: 100px; height: 100px; border-radius: 28px;
      display: flex; align-items: center; justify-content: center;
      position: relative;
    }
    .remote-initials {
      font-family: var(--font-mono);
      font-size: 28px; font-weight: 700; color: #fff;
    }
    .remote-name {
      font-size: 22px; font-weight: 700;
      letter-spacing: -0.3px;
      text-shadow: 0 2px 12px rgba(0,0,0,0.5);
      z-index: 2;
    }
    .call-status-label {
      font-size: 14px; color: #888;
      animation: pulse 2s ease infinite;
      z-index: 2;
    }

    /* Timer */
    .timer-wrap {
      position: absolute; top: 24px; left: 50%;
      transform: translateX(-50%);
      z-index: 10;
      display: flex; align-items: center; justify-content: center;
    }
    .timer-wrap.danger { animation: timerPulse 0.5s ease infinite; }
    .timer-svg { position: absolute; }
    .timer-text {
      display: flex; flex-direction: column;
      align-items: center; z-index: 1;
    }
    .timer-digits {
      font-family: var(--font-mono);
      font-size: 28px; font-weight: 700;
      transition: color 0.5s;
    }
    .timer-remaining {
      font-size: 9px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1.5px;
    }

    /* Local video PIP */
    .local-video-wrap {
      position: absolute; bottom: 110px; right: 20px;
      width: 130px; height: 174px;
      border-radius: 16px; overflow: hidden;
      background: #1A1A24;
      border: 2px solid rgba(255,255,255,0.1);
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      z-index: 10;
    }
    #local-video {
      width: 100%; height: 100%;
      object-fit: cover; transform: scaleX(-1);
    }
    .you-label {
      position: absolute; bottom: 6px; left: 8px;
      font-size: 10px; font-weight: 700;
      color: rgba(255,255,255,0.7);
      background: rgba(0,0,0,0.5);
      padding: 2px 7px; border-radius: 6px;
      font-family: var(--font-mono);
      letter-spacing: 0.5px; text-transform: uppercase;
    }

    /* Controls */
    .controls {
      position: absolute; bottom: 36px;
      display: flex; gap: 16px; align-items: center;
      z-index: 10;
    }
    .ctrl-btn {
      width: 50px; height: 50px; border-radius: 16px;
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.12);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s; color: #fff;
    }
    .ctrl-btn.active { background: var(--red); border-color: transparent; }
    .end-btn {
      width: 60px; height: 60px; border-radius: 20px;
      background: var(--red); border: none;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 24px rgba(232,69,60,0.4);
    }
    .end-btn:hover { transform: scale(1.06); }

    /* ── Ended Screen ─────────────────────────────────────── */
    #ended-screen {
      align-items: center; justify-content: center;
      flex-direction: column; gap: 16px;
      animation: fadeIn 0.4s ease;
    }
    .ended-avatar {
      width: 80px; height: 80px; border-radius: 22px;
      display: flex; align-items: center; justify-content: center;
    }
    .ended-title {
      font-family: var(--font-mono);
      font-size: 24px; font-weight: 700;
    }
    .ended-reason { font-size: 14px; color: #888; }
    .ended-stats {
      display: flex; gap: 32px; margin-top: 8px;
      padding: 16px 28px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
    }
    .stat-item {
      display: flex; flex-direction: column;
      align-items: center; gap: 4px;
    }
    .stat-value {
      font-family: var(--font-mono);
      font-size: 22px; font-weight: 700; color: var(--green);
    }
    .stat-label {
      font-size: 11px; color: var(--text-muted);
      text-transform: uppercase; letter-spacing: 1px;
    }
    .ended-actions { display: flex; gap: 12px; margin-top: 16px; }
    .recall-btn {
      display: flex; align-items: center; gap: 8px;
      padding: 12px 24px;
      background: var(--red); border: none; border-radius: 12px;
      color: #fff; font-size: 14px; font-weight: 600;
      font-family: var(--font-body); cursor: pointer;
    }
    .back-btn {
      padding: 12px 24px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-size: 14px; font-weight: 500;
      font-family: var(--font-body); cursor: pointer;
    }

    /* ── Animations ───────────────────────────────────────── */
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
    @keyframes ringPulse { 0% { transform: scale(1); opacity: 0.8; } 100% { transform: scale(2.5); opacity: 0; } }
    @keyframes timerPulse { 0%,100% { transform: translateX(-50%) scale(1); } 50% { transform: translateX(-50%) scale(1.05); } }
  </style>
</head>
<body>

  <!-- ══════════════ LOGIN SCREEN ══════════════ -->
  <div id="login-screen" class="screen active">
    <div class="login-logo">
      <div class="login-logo-icon">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#E8453C" stroke-width="2.5" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
      </div>
      <div>
        <div class="login-title">OneMinute</div>
        <div class="login-subtitle">Every second counts</div>
      </div>
    </div>
    <input type="text" id="name-input" class="login-input" placeholder="Enter your display name..." maxlength="30" />
    <button id="join-btn" class="login-btn">Join</button>
  </div>

  <!-- ══════════════ CONTACTS SCREEN ══════════════ -->
  <div id="contacts-screen" class="screen">
    <div class="header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#E8453C" stroke-width="2.5" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        </div>
        <div>
          <div class="logo-title">OneMinute</div>
          <div class="logo-sub">Every second counts</div>
        </div>
      </div>
      <div class="timer-badge">⏱ 60s calls</div>
    </div>
    <div class="my-name">Signed in as <span id="my-name-display"></span></div>
    <div class="search-wrap">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#888" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input type="text" id="search-input" class="search-input" placeholder="Search online users..." />
    </div>
    <div id="contacts-list" class="contacts-list"></div>
  </div>

  <!-- ══════════════ INCOMING CALL OVERLAY ══════════════ -->
  <div id="incoming-overlay" class="incoming-overlay">
    <div class="incoming-card">
      <div class="incoming-avatar" id="incoming-avatar" style="background: #E8453C;">
        <span class="avatar-text" style="font-size:24px;" id="incoming-initials">??</span>
        <div class="ring"></div>
        <div class="ring"></div>
      </div>
      <div class="incoming-name" id="incoming-name">Someone</div>
      <div class="incoming-label">Incoming video call...</div>
      <div class="incoming-actions">
        <button class="decline-btn" id="decline-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 002.59 3.4z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
        <button class="accept-btn" id="accept-btn">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M22 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92z"/></svg>
        </button>
      </div>
    </div>
  </div>

  <!-- ══════════════ CALL SCREEN ══════════════ -->
  <div id="call-screen" class="screen">
    <div class="remote-video-area">
      <video id="remote-video" autoplay playsinline></video>
      <div class="remote-placeholder" id="remote-placeholder">
        <div class="remote-avatar" id="call-remote-avatar" style="background: #3C7EE8;">
          <span class="remote-initials" id="call-remote-initials">??</span>
        </div>
        <div class="remote-name" id="call-remote-name">Someone</div>
        <div class="call-status-label" id="call-status-label">Calling...</div>
      </div>
    </div>

    <div class="timer-wrap" id="timer-wrap" style="display:none;">
      <svg width="110" height="110" viewBox="0 0 120 120" class="timer-svg">
        <circle cx="60" cy="60" r="54" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="5"/>
        <circle id="timer-ring" cx="60" cy="60" r="54" fill="none" stroke="#4ADE80" stroke-width="5" stroke-linecap="round"
          stroke-dasharray="339.292" stroke-dashoffset="0"
          style="transform:rotate(-90deg);transform-origin:center;transition:stroke-dashoffset 1s linear,stroke 0.5s"/>
      </svg>
      <div class="timer-text">
        <span class="timer-digits" id="timer-digits">1:00</span>
        <span class="timer-remaining">remaining</span>
      </div>
    </div>

    <div class="local-video-wrap">
      <video id="local-video" autoplay playsinline muted></video>
      <span class="you-label">You</span>
    </div>

    <div class="controls">
      <button class="ctrl-btn" id="mute-btn" title="Toggle Mic">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><path d="M12 1a3 3 0 00-3 3v8a3 3 0 006 0V4a3 3 0 00-3-3z"/><path d="M19 10v2a7 7 0 01-14 0v-2"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="8" y1="23" x2="16" y2="23"/></svg>
      </button>
      <button class="ctrl-btn" id="video-btn" title="Toggle Camera">
        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
      </button>
      <button class="end-btn" id="end-call-btn" title="End Call">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2.5" stroke-linecap="round"><path d="M10.68 13.31a16 16 0 003.41 2.6l1.27-1.27a2 2 0 012.11-.45c.907.338 1.85.573 2.81.7A2 2 0 0122 16.92v3a2 2 0 01-2.18 2 19.79 19.79 0 01-8.63-3.07 19.5 19.5 0 01-6-6A19.79 19.79 0 012.12 4.18 2 2 0 014.11 2h3a2 2 0 012 1.72c.127.96.362 1.903.7 2.81a2 2 0 01-.45 2.11L8.09 9.91a16 16 0 002.59 3.4z"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
      </button>
    </div>
  </div>

  <!-- ══════════════ ENDED SCREEN ══════════════ -->
  <div id="ended-screen" class="screen">
    <div class="ended-avatar" id="ended-avatar" style="background: #3C7EE8;">
      <span class="avatar-text" style="font-size:24px;" id="ended-initials">??</span>
    </div>
    <div class="ended-title">Call Ended</div>
    <div class="ended-reason" id="ended-reason">Your 60 seconds are up!</div>
    <div class="ended-stats">
      <div class="stat-item">
        <span class="stat-value" id="ended-duration">0:00</span>
        <span class="stat-label">Duration</span>
      </div>
    </div>
    <div class="ended-actions">
      <button class="recall-btn" id="recall-btn">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M1 4v6h6"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        Call Again
      </button>
      <button class="back-btn" id="back-btn">Back to Contacts</button>
    </div>
  </div>

<script>
// ═══════════════════════════════════════════════════════════════════════════
// OneMinute Client — Socket.IO + WebRTC
// ═══════════════════════════════════════════════════════════════════════════

const CALL_DURATION = 60;
const ICE_SERVERS = [
  { urls: "stun:stun.l.google.com:19302" },
  { urls: "stun:stun1.l.google.com:19302" },
  { urls: "stun:stun2.l.google.com:19302" },
];

// Update this to your deployed server URL
const SERVER_URL = window.location.origin;

const COLORS = [
  "#E8453C","#3C7EE8","#E8A83C","#3CE88A",
  "#A83CE8","#E83C8A","#3CE8E8","#8AE83C",
];

// ── State ────────────────────────────────────────────────────────────────

let socket = null;
let myUserId = null;
let myName = "";
let users = [];
let currentCallId = null;
let currentRemote = null; // { userId, name }
let isCaller = false;

let localStream = null;
let peerConnection = null;
let callTimer = null;
let timeLeft = CALL_DURATION;
let isMuted = false;
let isVideoOff = false;

// ── DOM refs ─────────────────────────────────────────────────────────────

const $ = (sel) => document.querySelector(sel);
const loginScreen = $("#login-screen");
const contactsScreen = $("#contacts-screen");
const callScreen = $("#call-screen");
const endedScreen = $("#ended-screen");
const incomingOverlay = $("#incoming-overlay");

function showScreen(id) {
  document.querySelectorAll(".screen").forEach(s => s.classList.remove("active"));
  document.getElementById(id).classList.add("active");
}

function getInitials(name) {
  return name.split(" ").map(w => w[0]).join("").toUpperCase().slice(0, 2);
}

function getColor(name) {
  let hash = 0;
  for (let i = 0; i < name.length; i++) hash = name.charCodeAt(i) + ((hash << 5) - hash);
  return COLORS[Math.abs(hash) % COLORS.length];
}

function formatTime(s) {
  return `${Math.floor(s / 60)}:${String(s % 60).padStart(2, "0")}`;
}

// ── Camera ───────────────────────────────────────────────────────────────

async function startCamera() {
  try {
    localStream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
    $("#local-video").srcObject = localStream;
  } catch (e) {
    console.warn("Camera access denied:", e);
  }
}

function stopCamera() {
  if (localStream) {
    localStream.getTracks().forEach(t => t.stop());
    localStream = null;
  }
}

// ── WebRTC ───────────────────────────────────────────────────────────────

function createPeerConnection() {
  peerConnection = new RTCPeerConnection({ iceServers: ICE_SERVERS });

  // Add local tracks
  if (localStream) {
    localStream.getTracks().forEach(track => {
      peerConnection.addTrack(track, localStream);
    });
  }

  // Handle remote stream
  peerConnection.ontrack = (event) => {
    const remoteVideo = $("#remote-video");
    remoteVideo.srcObject = event.streams[0];
    remoteVideo.style.display = "block";
    $("#remote-placeholder").style.display = "none";
  };

  // Send ICE candidates
  peerConnection.onicecandidate = (event) => {
    if (event.candidate && currentCallId) {
      socket.emit("webrtc-ice-candidate", {
        callId: currentCallId,
        candidate: event.candidate,
      });
    }
  };

  peerConnection.onconnectionstatechange = () => {
    console.log("WebRTC state:", peerConnection.connectionState);
  };
}

async function createAndSendOffer() {
  createPeerConnection();
  const offer = await peerConnection.createOffer();
  await peerConnection.setLocalDescription(offer);
  socket.emit("webrtc-offer", { callId: currentCallId, sdp: offer });
}

async function handleOffer(sdp) {
  createPeerConnection();
  await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
  const answer = await peerConnection.createAnswer();
  await peerConnection.setLocalDescription(answer);
  socket.emit("webrtc-answer", { callId: currentCallId, sdp: answer });
}

async function handleAnswer(sdp) {
  if (peerConnection) {
    await peerConnection.setRemoteDescription(new RTCSessionDescription(sdp));
  }
}

async function handleIceCandidate(candidate) {
  if (peerConnection) {
    try {
      await peerConnection.addIceCandidate(new RTCIceCandidate(candidate));
    } catch (e) {
      console.warn("ICE candidate error:", e);
    }
  }
}

function closePeerConnection() {
  if (peerConnection) {
    peerConnection.close();
    peerConnection = null;
  }
}

// ── Timer ────────────────────────────────────────────────────────────────

function startTimer() {
  timeLeft = CALL_DURATION;
  $("#timer-wrap").style.display = "flex";
  updateTimerUI();

  callTimer = setInterval(() => {
    timeLeft--;
    updateTimerUI();
    if (timeLeft <= 0) {
      clearInterval(callTimer);
    }
  }, 1000);
}

function updateTimerUI() {
  const circumference = 2 * Math.PI * 54;
  const progress = timeLeft / CALL_DURATION;
  const offset = circumference * (1 - progress);
  const color = timeLeft <= 10 ? "#E8453C" : timeLeft <= 20 ? "#E8A83C" : "#4ADE80";

  $("#timer-ring").setAttribute("stroke-dashoffset", offset);
  $("#timer-ring").setAttribute("stroke", color);
  $("#timer-digits").textContent = formatTime(timeLeft);
  $("#timer-digits").style.color = color;
  $("#timer-wrap").className = timeLeft <= 10 ? "timer-wrap danger" : "timer-wrap";
}

function stopTimer() {
  clearInterval(callTimer);
  $("#timer-wrap").style.display = "none";
}

// ── UI: Render Contacts ──────────────────────────────────────────────────

function renderContacts(filter = "") {
  const list = $("#contacts-list");
  const filtered = users
    .filter(u => u.userId !== myUserId)
    .filter(u => u.name.toLowerCase().includes(filter.toLowerCase()));

  if (filtered.length === 0) {
    list.innerHTML = `<div style="text-align:center;color:#666;padding:40px;font-size:14px;">
      ${users.length <= 1 ? "No other users online yet.<br>Open this page in another tab to test!" : "No matches found."}
    </div>`;
    return;
  }

  list.innerHTML = filtered.map((user, i) => {
    const color = getColor(user.name);
    const initials = getInitials(user.name);
    return `
      <div class="contact-card" style="animation-delay:${i * 0.05}s" onclick="callUser('${user.userId}','${user.name.replace(/'/g, "\\'")}')">
        <div class="avatar" style="background:${color}">
          <span class="avatar-text">${initials}</span>
          <div class="status-dot" style="background:#4ADE80"></div>
        </div>
        <div class="contact-info">
          <span class="contact-name">${user.name}</span>
          <span class="contact-status">Online</span>
        </div>
        <div class="call-btn">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><polygon points="23 7 16 12 23 17 23 7"/><rect x="1" y="5" width="15" height="14" rx="2" ry="2"/></svg>
        </div>
      </div>`;
  }).join("");
}

// ── UI: Call screen setup ────────────────────────────────────────────────

function setupCallUI(name, status) {
  const color = getColor(name);
  const initials = getInitials(name);
  $("#call-remote-avatar").style.background = color;
  $("#call-remote-initials").textContent = initials;
  $("#call-remote-name").textContent = name;
  $("#call-status-label").textContent = status;
  $("#remote-video").style.display = "none";
  $("#remote-placeholder").style.display = "flex";
  isMuted = false;
  isVideoOff = false;
  $("#mute-btn").classList.remove("active");
  $("#video-btn").classList.remove("active");
}

function setupEndedUI(name, reason, duration) {
  const color = getColor(name);
  const initials = getInitials(name);
  $("#ended-avatar").style.background = color;
  $("#ended-initials").textContent = initials;
  $("#ended-reason").textContent = reason;
  $("#ended-duration").textContent = formatTime(duration);
}

// ── Actions ──────────────────────────────────────────────────────────────

async function callUser(userId, name) {
  currentRemote = { userId, name };
  isCaller = true;
  setupCallUI(name, "Calling...");
  showScreen("call-screen");
  await startCamera();
  socket.emit("call-user", { calleeId: userId });
}

function endCurrentCall() {
  if (currentCallId) {
    socket.emit("end-call", { callId: currentCallId });
  }
  cleanup();
  const duration = CALL_DURATION - timeLeft;
  if (currentRemote) {
    setupEndedUI(currentRemote.name, `Call with ${currentRemote.name} ended`, duration);
  }
  showScreen("ended-screen");
}

function cleanup() {
  stopTimer();
  stopCamera();
  closePeerConnection();
  currentCallId = null;
  isCaller = false;
}

// ── Socket.IO ────────────────────────────────────────────────────────────

function connectSocket() {
  socket = io(SERVER_URL);

  socket.on("connect", () => {
    console.log("Connected to signaling server");
    socket.emit("register", { name: myName });
  });

  socket.on("registered", ({ userId }) => {
    myUserId = userId;
    $("#my-name-display").textContent = myName;
    showScreen("contacts-screen");
  });

  socket.on("user-list", (list) => {
    users = list;
    renderContacts($("#search-input").value);
  });

  // ── Caller flow ──────────────────────────────────────────────────────
  socket.on("call-ringing", ({ callId, calleeName }) => {
    currentCallId = callId;
  });

  socket.on("call-accepted", async ({ callId }) => {
    currentCallId = callId;
    $("#call-status-label").textContent = "Connected";
    startTimer();

    // Caller creates the offer
    if (isCaller) {
      await createAndSendOffer();
    }
  });

  socket.on("call-declined", ({ callId }) => {
    cleanup();
    if (currentRemote) {
      setupEndedUI(currentRemote.name, `${currentRemote.name} declined the call`, 0);
    }
    showScreen("ended-screen");
  });

  socket.on("call-not-answered", ({ callId }) => {
    cleanup();
    if (currentRemote) {
      setupEndedUI(currentRemote.name, `${currentRemote.name} didn't answer`, 0);
    }
    showScreen("ended-screen");
  });

  // ── Callee flow ──────────────────────────────────────────────────────
  socket.on("incoming-call", ({ callId, callerId, callerName }) => {
    currentCallId = callId;
    currentRemote = { userId: callerId, name: callerName };
    isCaller = false;

    const color = getColor(callerName);
    $("#incoming-avatar").style.background = color;
    $("#incoming-initials").textContent = getInitials(callerName);
    $("#incoming-name").textContent = callerName;
    incomingOverlay.classList.add("active");
  });

  socket.on("call-cancelled", () => {
    incomingOverlay.classList.remove("active");
    currentCallId = null;
    currentRemote = null;
  });

  // ── WebRTC signaling ─────────────────────────────────────────────────
  socket.on("webrtc-offer", async ({ callId, sdp }) => {
    currentCallId = callId;
    await startCamera();
    await handleOffer(sdp);
  });

  socket.on("webrtc-answer", async ({ callId, sdp }) => {
    await handleAnswer(sdp);
  });

  socket.on("webrtc-ice-candidate", async ({ callId, candidate }) => {
    await handleIceCandidate(candidate);
  });

  // ── Call end events ──────────────────────────────────────────────────
  socket.on("call-timeout", ({ callId }) => {
    cleanup();
    if (currentRemote) {
      setupEndedUI(currentRemote.name, "Your 60 seconds are up!", CALL_DURATION);
    }
    showScreen("ended-screen");
  });

  socket.on("call-ended", ({ callId, duration }) => {
    cleanup();
    incomingOverlay.classList.remove("active");
    if (currentRemote) {
      setupEndedUI(currentRemote.name, `Call with ${currentRemote.name} ended`, duration);
      showScreen("ended-screen");
    } else {
      showScreen("contacts-screen");
    }
  });

  socket.on("call-error", ({ message }) => {
    alert(message);
    cleanup();
    showScreen("contacts-screen");
  });

  socket.on("disconnect", () => {
    console.warn("Disconnected from server");
  });
}

// ── Event Listeners ──────────────────────────────────────────────────────

// Login
$("#join-btn").addEventListener("click", () => {
  const name = $("#name-input").value.trim();
  if (!name) return;
  myName = name;
  connectSocket();
});
$("#name-input").addEventListener("keydown", (e) => {
  if (e.key === "Enter") $("#join-btn").click();
});

// Search
$("#search-input").addEventListener("input", (e) => {
  renderContacts(e.target.value);
});

// Incoming call buttons
$("#accept-btn").addEventListener("click", async () => {
  incomingOverlay.classList.remove("active");
  setupCallUI(currentRemote.name, "Connecting...");
  showScreen("call-screen");
  await startCamera();
  socket.emit("accept-call", { callId: currentCallId });
});

$("#decline-btn").addEventListener("click", () => {
  incomingOverlay.classList.remove("active");
  socket.emit("decline-call", { callId: currentCallId });
  currentCallId = null;
  currentRemote = null;
});

// Call controls
$("#mute-btn").addEventListener("click", () => {
  isMuted = !isMuted;
  if (localStream) localStream.getAudioTracks().forEach(t => t.enabled = !isMuted);
  $("#mute-btn").classList.toggle("active", isMuted);
});

$("#video-btn").addEventListener("click", () => {
  isVideoOff = !isVideoOff;
  if (localStream) localStream.getVideoTracks().forEach(t => t.enabled = !isVideoOff);
  $("#video-btn").classList.toggle("active", isVideoOff);
});

$("#end-call-btn").addEventListener("click", endCurrentCall);

// Ended screen
$("#recall-btn").addEventListener("click", () => {
  if (currentRemote) callUser(currentRemote.userId, currentRemote.name);
});
$("#back-btn").addEventListener("click", () => {
  currentRemote = null;
  showScreen("contacts-screen");
});
</script>
</body>
</html>
